<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gorashe Suliman — Portfolio</title>
  <!--
    =====================================================================
    GitHub Pages SPA Fix — قم بوضع هذا الملف في مجلد public/
    =====================================================================
    عندما يحاول المستخدم الوصول إلى مسار مثل /My-Portfolio/certifications
    مباشرة، GitHub Pages يُعيد 404. هذا الملف يعترض الـ 404 ويعيد
    التوجيه إلى index.html مع الاحتفاظ بمعلومات المسار الأصلي.
    =====================================================================
  -->
  <script>
    // SPA GitHub Pages Redirect — MIT License
    // pathSegmentsToKeep = 1  →  يحتفظ بـ /My-Portfolio/ في المسار
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
